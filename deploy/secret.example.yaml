# Template for the go-you-secrets Secret. DO NOT put real values in this file.
# Copy it to secret.yaml (gitignored), fill in real values, then:
#   kubectl apply -n go-you-poc -f secret.yaml
#
# MYSQL_DSN format: user:password@tcp(host:3306)/dbname?parseTime=true&timeout=5s
#   -> tenant/config DB (the `user` DB).
# STATIC_MYSQL_DSN: the SEPARATE static-persona DB (Python SQL_YOU: the `you`
#   cluster/db). Different host+db+credential than MYSQL_DSN. Optional — leave
#   unset to disable the static lane (phone breach empty, digital_age error).
# PROXY_URL format: http://user:pass@host:port  (leave empty to crawl direct)
apiVersion: v1
kind: Secret
metadata:
  name: go-you-secrets
  namespace: go-you-poc
type: Opaque
stringData:
  MYSQL_DSN: "REPLACE_ME_user:pass@tcp(host:3306)/user?parseTime=true&timeout=5s"
  STATIC_MYSQL_DSN: "REPLACE_ME_youdbadmin:pass@tcp(you-host:3306)/you?parseTime=true&timeout=5s"
  PROXY_URL: "REPLACE_ME_http://user:pass@host:port"
