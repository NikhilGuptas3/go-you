apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.deploymentName }}
  labels:
    app: {{ .Values.deploymentName }}
spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.deploymentName }}
  template:
    metadata:
      labels:
        app: {{ .Values.deploymentName }}
      annotations:
        prometheus.io/scrape: 'true'
        prometheus.io/port: '5000'
        prometheus.io/path: '/metrics'
    spec:
      containers:
        - name: go-you
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 5000
              protocol: TCP
          env:
            - name: PORT
              value: "5000"
            - name: CRAWLER_HTTP_TIMEOUT_MS
              value: "{{ .Values.crawlerHttpTimeoutMs }}"
            # NAMESPACE drives the ConfigFetcher override table (configs_<ns>):
            # a namespace other than you/token makes go-you read configs_<ns>
            # on top of the base configs table, matching config_fetcher.py.
            #
            # NOTE: in namespace go-you-poc this would look for configs_go-you-poc,
            # which likely does not exist -> override lookups error (logged,
            # non-fatal; base configs still used). To read base config cleanly for
            # the POC, override this to "you" via values, or leave it and accept the
            # benign log noise. See the plan's "namespace override table" risk.
            - name: NAMESPACE
              value: "{{ .Values.configNamespace | default "you" }}"
          # MYSQL_DSN and PROXY_URL come from the go-you-secrets Secret.
          envFrom:
            - secretRef:
                name: go-you-secrets
          readinessProbe:
            httpGet:
              path: /readyz
              port: 5000
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
